          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceInvite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInvite'
          description: ''
  /api/v1/workspaces/{workspace_id}/invite/accept/:
    post:
      operationId: workspaces_invite_accept
      description: |-
        Handle direct invite acceptance endpoint.

        Parameters:
        - request: authenticated API request
        - workspace_id: workspace UUID

        Returns:
        - standardized success response with joined workspace data
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceSummaryResponse'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceSummaryResponse'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceSummaryResponse'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceSummaryResponse'
          description: ''
  /api/v1/workspaces/{workspace_id}/projects/:
    get:
      operationId: workspaces_projects_list
      description: |-
        Handle workspace projects endpoint with membership access control.

        Parameters:
        - request: authenticated API request
        - workspace_id: workspace UUID

        Returns:
        - standardized success response with project list
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Workspaces
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceProjectResponse'
          description: ''
  /api/v1/workspaces/{workspace_id}/stats/:
    get:
      operationId: workspaces_stats_retrieve
      description: |-
        Handle workspace stats endpoint.

        Parameters:
        - request: authenticated API request
        - workspace_id: workspace UUID

        Returns:
        - standardized success response with aggregated workspace stats
      parameters:
      - in: path
        name: workspace_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Workspaces
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceStatsResponse'
          description: ''
  /api/v1/workspaces/invite/accept-token/:
    post:
      operationId: workspaces_invite_accept_token_create
      description: |-
        Handle invite acceptance via JWT token endpoint.

        Parameters:
        - request: authenticated API request with token payload

        Returns:
        - standardized success response with joined workspace data
      tags:
      - Workspaces
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInviteToken'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WorkspaceInviteToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/WorkspaceInviteToken'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceInviteToken'
          description: ''
components:
  schemas:
    ActivityLogResponse:
      type: object
      description: Serialize activity log payload.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
        details: {}
        created_at:
          type: string
          format: date-time
      required:
      - action
      - created_at
      - details
      - id
      - resource_id
      - resource_type
      - user_id
    ChangePassword:
      type: object
      description: |-
        Validate change-password payload.

        Inputs:
        - currentPassword: current account password
        - newPassword: new password candidate
        - confirmPassword: confirmation password

        Outputs:
        - validated_data with password update fields
      properties:
        currentPassword:
          type: string
          writeOnly: true
        newPassword:
          type: string
          writeOnly: true
        confirmPassword:
          type: string
          writeOnly: true
      required:
      - confirmPassword
      - currentPassword
      - newPassword
    CommentCreate:
      type: object
      description: Validate task comment creation payload.
      properties:
        text:
          type: string
        mentions: {}
        reactions: {}
        attachments: {}
      required:
      - text
    CommentResponse:
      type: object
      description: Serialize task comment response payload.
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        task_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        mentions: {}
        reactions: {}
        attachments: {}
        is_edited:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
      - attachments
      - author_id
      - created_at
      - id
      - is_edited
      - mentions
      - reactions
      - task_id
      - text
    ForgotPassword:
      type: object
      description: |-
        Validate forgot-password payload.

        Inputs:
        - email: account email address

        Outputs:
        - normalized email in validated_data
      properties:
        email:
          type: string
          format: email
      required:
      - email
    Login:
      type: object
      description: |-
        Validate login payload.

        Inputs:
        - email: user email
        - password: plain password

        Outputs:
        - validated_data with normalized credentials
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    Logout:
      type: object
      description: |-
        Validate logout payload.

        Inputs:
        - refresh: refresh JWT token

        Outputs:
        - validated_data containing refresh token string
      properties:
        refresh:
          type: string
      required:
      - refresh
    NullEnum:
      enum:
      - null
    ProfileUpdate:
      type: object
      description: |-
        Validate profile update payload.

        Inputs:
        - name: optional display name
        - profilePicture: optional avatar image

        Outputs:
        - validated_data with profile fields to update
      properties:
        name:
          type: string
          nullable: true
          maxLength: 50
        profilePicture:
          type: string
          format: uri
          nullable: true
    ProjectCreate:
      type: object
      description: Validate project creation payload.
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/ProjectStatusEnum'
          default: Planning
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        progress:
          type: integer
          maximum: 100
          minimum: 0
          default: 0
      required:
      - title
    ProjectMemberResponse:
      type: object
      description: Serialize project member response payload.
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/ProjectMemberRoleEnum'
        tags: {}
      required:
      - email
      - name
      - role
      - tags
      - user_id
    ProjectMemberRoleEnum:
      enum:
      - manager
      - contributor
      - viewer
      type: string
      description: |-
        * `manager` - Manager
        * `contributor` - Contributor
        * `viewer` - Viewer
    ProjectResponse:
      type: object
      description: Serialize project response payload.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        workspace_id:
          type: string
          format: uuid
        status:
          type: string
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        progress:
          type: integer
        created_by:
          type: string
          format: uuid
        is_archived:
          type: boolean
        members:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMemberResponse'
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - created_by
      - description
      - due_date
      - id
      - is_archived
      - members
      - progress
      - start_date
      - status
      - title
      - workspace_id
    ProjectStatusEnum:
      enum:
      - Planning
      - In Progress
      - On Hold
      - Completed
      - Cancelled
      type: string
      description: |-
        * `Planning` - Planning
        * `In Progress` - In Progress
        * `On Hold` - On Hold
        * `Completed` - Completed
        * `Cancelled` - Cancelled
    ProjectTaskResponse:
      type: object
      description: Serialize project-task listing payload.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
        priority:
          type: string
        due_date:
          type: string
          format: date-time
          nullable: true
        is_archived:
          type: boolean
      required:
      - due_date
      - id
      - is_archived
      - priority
      - status
      - title
    RefreshToken:
      type: object
      description: |-
        Validate refresh payload.

        Inputs:
        - refresh: refresh JWT token

        Outputs:
        - validated_data containing refresh token string
      properties:
        refresh:
          type: string
      required:
      - refresh
    Register:
      type: object
      description: |-
        Validate registration payload.

        Inputs:
        - email: unique email address
        - name: display name
        - password: account password
        - confirm_password: repeated password

        Outputs:
        - validated_data with normalized fields for service usage
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          maxLength: 50
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - confirm_password
      - email
      - name
      - password
    ResetPassword:
      type: object
      description: |-
        Validate reset-password payload.

        Inputs:
        - email: account email address
        - token: password reset token
        - newPassword: new password candidate
        - confirmPassword: confirmation password

        Outputs:
        - normalized/reset-ready payload in validated_data
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        newPassword:
          type: string
          writeOnly: true
        confirmPassword:
          type: string
          writeOnly: true
      required:
      - confirmPassword
      - email
      - newPassword
      - token
    SubTaskCreate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
      required:
      - title
    SubTaskUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        completed:
          type: boolean
    TaskActivityResponse:
      type: object
      description: Serialize task activity response payload.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: string
          format: uuid
        details: {}
        created_at:
          type: string
          format: date-time
      required:
      - action
      - created_at
      - details
      - id
      - resource_id
      - resource_type
      - user_id
    TaskAssignees:
      type: object
      properties:
        value:
          type: array
          items:
            type: string
            format: uuid
    TaskCommentCreate:
      type: object
      properties:
        text:
          type: string
        mentions: {}
        reactions: {}
        attachments: {}
      required:
      - text
    TaskCreate:
      type: object
      description: Validate task creation payload.
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        status:
          allOf:
          - $ref: '#/components/schemas/TaskStatusEnum'
          default: To Do
        priority:
          allOf:
          - $ref: '#/components/schemas/TaskPriorityEnum'
          default: Medium
        due_date:
          type: string
          format: date-time
          nullable: true
        estimated_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        actual_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        tags: {}
        assignee_ids:
          type: array
          items:
            type: string
            format: uuid
      required:
      - title
    TaskPriority:
      type: object
      properties:
        priority:
          $ref: '#/components/schemas/TaskPriorityEnum'
      required:
      - priority
    TaskPriorityEnum:
      enum:
      - Low
      - Medium
      - High
      type: string
      description: |-
        * `Low` - Low
        * `Medium` - Medium
        * `High` - High
    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        priority:
          type: string
        project_id:
          type: string
          format: uuid
        assignee_ids:
          type: array
          items:
            type: string
            format: uuid
        watcher_ids:
          type: array
          items:
            type: string
            format: uuid
        due_date:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        estimated_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        actual_hours:
          type: string
          format: decimal
          pattern: ^-?\d{0,5}(?:\.\d{0,2})?$
          nullable: true
        tags: {}
        created_by:
          type: string
          format: uuid
        is_archived:
          type: boolean
        created_at:
          type: string
          format: date-time
      required:
      - actual_hours
      - assignee_ids
      - completed_at
      - created_at
      - created_by
      - description
      - due_date
      - estimated_hours
      - id
      - is_archived
      - priority
      - project_id
      - status
      - tags
      - title
      - watcher_ids
    TaskStatus:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/TaskStatusEnum'
      required:
      - status
    TaskStatusEnum:
      enum:
      - To Do
      - In Progress
      - Review
      - Done
      type: string
      description: |-
        * `To Do` - To Do
        * `In Progress` - In Progress
        * `Review` - Review
        * `Done` - Done
    TaskUpdateField:
      type: object
      description: Validate generic task update field payload.
      properties:
        value:
          type: string
      required:
      - value
    TaskWatchResponse:
      type: object
      description: Serialize watch-toggle response payload.
      properties:
        task_id:
          type: string
          format: uuid
        watched:
          type: boolean
      required:
      - task_id
      - watched
    VerifyEmail:
      type: object
      description: |-
        Validate verify-email payload.

        Inputs:
        - email: account email address
        - token: email verification token

        Outputs:
        - normalized email and token in validated_data
      properties:
        email:
          type: string
          format: email
        token:
          type: string
      required:
      - email
      - token
    WorkspaceCreate:
      type: object
      description: Validate workspace creation payload for service layer usage.
      properties:
        name:
          type: string
          maxLength: 120
        description:
          type: string
          nullable: true
        color:
          type: string
          default: '#FF5733'
          maxLength: 16
      required:
      - name
    WorkspaceDetailResponse:
      type: object
      description: Serialize workspace detail payload for response validation.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        owner_id:
          type: string
          format: uuid
        role:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/WorkspaceRoleEnum'
          - $ref: '#/components/schemas/NullEnum'
        created_at:
          type: string
          format: date-time
        members:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMemberResponse'
      required:
      - color
      - created_at
      - description
      - id
      - members
      - name
      - owner_id
      - role
    WorkspaceInvite:
      type: object
      description: Validate invite payload for service layer usage.
      properties:
        email:
          type: string
          format: email
        role:
          allOf:
          - $ref: '#/components/schemas/WorkspaceRoleEnum'
          default: member
      required:
      - email
    WorkspaceInviteToken:
      type: object
      description: Validate invite-token acceptance payload for service layer usage.
      properties:
        token:
          type: string
      required:
      - token
    WorkspaceMemberResponse:
      type: object
      description: Serialize workspace member payload for response validation.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/WorkspaceRoleEnum'
        joined_at:
          type: string
          format: date-time
      required:
      - email
      - id
      - joined_at
      - name
      - role
    WorkspaceProjectResponse:
      type: object
      description: Serialize workspace project payload for response validation.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - name
      - status
    WorkspaceRoleEnum:
      enum:
      - owner
      - admin
      - member
      - viewer
      type: string
      description: |-
        * `owner` - Owner
        * `admin` - Admin
        * `member` - Member
        * `viewer` - Viewer
    WorkspaceStatsResponse:
      type: object
      description: Serialize workspace stats payload for response validation.
      properties:
        workspace_id:
          type: string
          format: uuid
        member_count:
          type: integer
        project_count:
          type: integer
        projects_by_status:
          type: object
          additionalProperties:
            type: integer
      required:
      - member_count
      - project_count
      - projects_by_status
      - workspace_id
    WorkspaceSummaryResponse:
      type: object
      description: Serialize workspace summary payload for response validation.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        owner_id:
          type: string
          format: uuid
        role:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/WorkspaceRoleEnum'
          - $ref: '#/components/schemas/NullEnum'
        created_at:
          type: string
          format: date-time
      required:
      - color
      - created_at
      - description
      - id
      - name
      - owner_id
      - role
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
- name: Authentication
  description: User authentication endpoints (register, login, refresh, logout).
