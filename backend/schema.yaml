openapi: 3.0.3
info:
  title: Project Manager API
  version: 1.0.0
  description: Production-ready DRF APIs with service-layer architecture.
paths:
  /api/v1/activity/{resource_id}/:
    get:
      operationId: activity_retrieve
      description: |-
        Handle activity list by resource endpoint.

        Parameters:
        - request: authenticated request
        - resource_id: target resource UUID

        Returns:
        - standardized success response with activity records
      parameters:
      - in: path
        name: resource_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Activity
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogResponse'
          description: ''
